<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HCJdemo</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <nav class="navbar">
      <div class="container">
        <div class="logo">WebDemo</div>
        <ul class="nav">
          <li>
            <a href="index.html">Home</a>
          </li>
          <li>
            <a href="menu.html">Menu</a>
          </li>
        </ul>
      </div>
    </nav>

    <h1>form basic</h1>
    <form action="">
      <label for="name">Name:</label><br />
      <input type="text" id="name" name="name" /><br />
      <label for="email">Email:</label><br />
      <input type="email" id="email" name="email" /><br />
      <label for="pwd">Password:</label><br />
      <input type="password" id="pwd" name="pwd" /><br /><br />
      <input type="submit" value="Submit" onclick="alert('제출되었습니다!')" />
      <input type="reset" value="Reset" /><br />

      <p>Using web languages:</p>

      <input type="checkbox" id="vehicle1" name="vehicle1" value="Html" />
      <label for="vehicle1"> Html</label><br />
      <input type="checkbox" id="vehicle2" name="vehicle2" value="Css" />
      <label for="vehicle2"> Css</label><br />
      <input type="checkbox" id="vehicle3" name="vehicle3" value="JavaScript" />
      <label for="vehicle3"> JavaScript</label><br />
      <input type="checkbox" id="vehicle4" name="vehicle4" value="Python" />
      <label for="vehicle4"> Python</label><br />

      <p>Choose your level:</p>
      <input type="radio" id="beginner" name="fav_language" value="beginner" />
      <label for="beginner">Beginner</label><br />
      <input
        type="radio"
        id="intermediate"
        name="fav_language"
        value="intermediate"
      />
      <label for="intermediate">Intermediate</label><br />
      <input type="radio" id="advanced" name="fav_language" value="advanced" />
      <label for="advanced">Advanced</label><br /><br />
      <input type="submit" value="Submit" onclick="alert('제출되었습니다!')" />
    </form>
  </body>
</html>
